# ============================================================
#  Debate system configuration — single source of truth.
#  No parameter is hardcoded in Python; everything lives here.
#  Secrets are NEVER stored here — see .env / .env.example.
# ============================================================

llm:
  provider: groq                 # anthropic | openai | groq | mock
  judge_model: llama-3.3-70b-versatile   # judge uses the stronger model
  debater_model: llama-3.1-8b-instant    # debaters: fast + cheap
  temperature: 0.8               # debaters: more creative
  judge_temperature: 0.2         # judge: more deterministic
  max_tokens: 400                # caps output tokens (debaters word-capped anyway);
                                 # smaller completions stay under Groq free-tier TPM
  # USD cost per 1M tokens, used by the gatekeeper for estimates
  # (Groq llama-3.3-70b rates — conservative upper bound).
  cost_per_mtok_input: 0.59
  cost_per_mtok_output: 0.79

debate:
  topic: "Which is better: Barcelona or Real Madrid?"
  rounds_per_side: 5             # BUDGET MODE (disclosed): 5/side instead of 10
                                 # to stay within the Groq free-tier rate limits.
  max_words_per_turn: 150
  pro_skill: "evidence-and-data persuader"
  con_skill: "emotional-and-rhetorical persuader"

timeouts:
  request_seconds: 60
  retries: 5                     # weather Groq free-tier 429s (token-per-minute bucket)
  backoff_seconds: 10            # escalating waits (10s,20s,...) let the TPM bucket refill
  circuit_breaker_threshold: 8   # consecutive failures before opening (headroom for pacing)

watchdog:
  keepalive_seconds: 150         # allow in-turn backoff to wait out a rate window;
                                 # request_seconds still bounds any single hung call
  max_restarts: 3

gatekeeper:
  max_total_calls: 80
  max_total_usd: 2.00
  max_tokens_total: 200000

search:
  provider: tavily               # web search backend
  max_results: 3
  request_seconds: 20
  cache: true                    # memoise identical queries (1 live call/side per debate)
  # Anti-SSRF egress allowlist — only these hosts may be contacted.
  allowed_domains:
    - "api.tavily.com"

logging:
  dir: ./logs
  fifo_max_files: 20
  fifo_max_lines_per_file: 500
  level: INFO

security:
  max_external_content_chars: 4000   # sanitizer truncation cap
  enable_moderation: true
  banned_terms_file: null            # optional path to a custom list
